<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rekenmachine</title>
    <link rel="stylesheet" href="Rekenenmachine.css" />
  </head>
  <body>
    <div class="calc-wrap">
      <div class="calc">
        <div class="calc__display">
          <div class="calc__expr" id="expr"></div>
          <div class="calc__number" id="display">0</div>
        </div>

        <div class="calc__keys" id="keys">
          <button class="key key--action" data-val="AC">AC</button>
          <button class="key key--action" data-val="+/-">+/-</button>
          <button class="key key--action" data-val="%">%</button>
          <button class="key key--op" data-val="/">÷</button>

          <button class="key" data-val="7">7</button>
          <button class="key" data-val="8">8</button>
          <button class="key" data-val="9">9</button>
          <button class="key key--op" data-val="*">×</button>

          <button class="key" data-val="4">4</button>
          <button class="key" data-val="5">5</button>
          <button class="key" data-val="6">6</button>
          <button class="key key--op" data-val="-">−</button>

          <button class="key" data-val="1">1</button>
          <button class="key" data-val="2">2</button>
          <button class="key" data-val="3">3</button>
          <button class="key key--op" data-val="+">+</button>

          <button class="key key--zero" data-val="0">0</button>
          <button class="key" data-val=".">.</button>
          <button class="key key--equals" data-val="=">=</button>
        </div>
      </div>
    </div>

    <script src="Rekenenmachine.js"></script>
  </body>
</html>
